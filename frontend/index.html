<!DOCTYPE html>
<html lang="en" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CTRL-Modem - Cellular Modem Management" />
    <meta name="theme-color" content="#1e293b" />
    
    <title>CTRL-Modem</title>
    
    <!-- Favicon with media queries for light/dark mode -->
    <!-- Light mode (default): dark background favicon - visible in light browser tabs -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" media="(prefers-color-scheme: light)">
    
    <!-- Dark mode: transparent background favicon - cleaner look in dark browser tabs -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-dark-32x32.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-dark-16x16.png" media="(prefers-color-scheme: dark)">
    
    <!-- Fallback for browsers that don't support media queries on link elements -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    
    <!-- Android Chrome Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="./android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./android-chrome-512x512.png">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="./site.webmanifest">
  </head>
  <body style="background-color: var(--color-bg-primary);">
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
